<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#0f172a;
      color:#f8fafc;
      padding:20px;
      overflow-x:hidden;
    }

    .container{
      max-width:1600px;
      margin:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:20px;
    }

    .title h1{
      font-size:38px;
      font-weight:800;
    }

    .title p{
      color:#94a3b8;
      margin-top:8px;
    }

    .update-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      padding:15px 22px;
      border-radius:20px;
      backdrop-filter:blur(12px);
      color:#cbd5e1;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:linear-gradient(145deg,#111827,#1e293b);
      border:1px solid rgba(255,255,255,0.06);
      padding:28px;
      border-radius:30px;
      box-shadow:0 20px 45px rgba(0,0,0,0.25);
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:'';
      position:absolute;
      width:220px;
      height:220px;
      background:rgba(255,255,255,0.04);
      border-radius:50%;
      left:-80px;
      top:-80px;
    }

    .card-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .card-title{
      font-size:18px;
      color:#cbd5e1;
      font-weight:700;
    }

    .card-icon{
      font-size:36px;
    }

    .card-value{
      font-size:48px;
      font-weight:800;
      color:#22c55e;
      word-break:break-word;
    }

    .section{
      background:linear-gradient(145deg,#111827,#1e293b);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:30px;
      padding:25px;
      box-shadow:0 15px 35px rgba(0,0,0,0.2);
    }

    .section-title{
      font-size:30px;
      font-weight:800;
      margin-bottom:20px;
    }

    .search-box{
      margin-bottom:20px;
    }

    .search-box input{
      width:100%;
      background:#0f172a;
      border:1px solid rgba(255,255,255,0.08);
      padding:16px 20px;
      border-radius:18px;
      color:white;
      font-size:15px;
      outline:none;
    }

    .table-container{
      overflow:auto;
      max-height:750px;
      border-radius:22px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }

    thead{
      background:#020617;
      position:sticky;
      top:0;
      z-index:5;
    }

    th{
      padding:16px;
      color:#f8fafc;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }

    td{
      padding:14px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.05);
      color:#e2e8f0;
      font-size:14px;
      white-space:nowrap;
    }

    tbody tr:hover{
      background:rgba(255,255,255,0.03);
    }

    .badge{
      padding:7px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      display:inline-block;
    }

    .sell{
      background:#052e16;
      color:#22c55e;
    }

    .buy{
      background:#450a0a;
      color:#f87171;
    }

    .collect{
      background:#172554;
      color:#60a5fa;
    }

    .pay{
      background:#422006;
      color:#facc15;
    }

    @media(max-width:900px){

      .title h1{
        font-size:30px;
      }

      .card-value{
        font-size:36px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

    }

  </style>
</head>
<body>

<div class="container">

  <div class="topbar">

    <div class="title">
      <h1 id="clientName">Client Portal</h1>
      <p>كشف حساب العميل والتعاملات اليومية</p>
    </div>

    <div class="update-box">
      آخر تحديث: <span id="updateTime">---</span>
    </div>

  </div>


  <div class="cards">

    <div class="card">

      <div class="card-header">
        <div class="card-title">إجمالي الرصيد</div>
        <div class="card-icon">💰</div>
      </div>

      <div class="card-value" id="balanceCard">0</div>

    </div>

  </div>


  <div class="section">

    <div class="section-title">📊 التقرير الكامل</div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث داخل العمليات...">
    </div>

    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th>م</th>
            <th>عميل/مورد</th>
            <th>الاسم</th>
            <th>العملية</th>
            <th>الصنف</th>
            <th>الوزن بالطن</th>
            <th>سعر الطن</th>
            <th>ملحوظات</th>
            <th></th>
            <th>المبلغ</th>
            <th>التاريخ</th>
            <th></th>
            <th>اليوم</th>
          </tr>
        </thead>

        <tbody id="reportTable"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

function getClientId(){

  const params = new URLSearchParams(window.location.search);

  return params.get('id');

}

function formatNumber(value){

  if(!value) return '0';

  let number = Number(String(value).replace(/,/g,''));

  if(isNaN(number)) return value;

  return number.toLocaleString('en-US');

}

async function loadClient(){

  const clientId = getClientId();

  if(!clientId){
    alert('No Client ID');
    return;
  }

  const response = await fetch(`./clients/${clientId}.csv?v=` + new Date().getTime());

  const text = await response.text();

  const rows = text.split('\n').map(r => r.split(','));

  document.getElementById('updateTime').innerText = new Date().toLocaleString('ar-EG');

  // =========================
  // CLIENT NAME
  // =========================

  let clientName = rows[1][2] || clientId;

  document.getElementById('clientName').innerText = clientName;

  // =========================
  // BALANCE CARD
  // =========================

  const balance = rows[0][14];

  document.getElementById('balanceCard').innerText = formatNumber(balance);

  // =========================
  // REPORT TABLE
  // =========================

  const table = document.getElementById('reportTable');

  for(let i = 0; i < rows.length; i++){

    const row = rows[i];

    if(row[0]){

      let operationClass = row[3]?.includes('بيع') ? 'sell' : 'buy';

      let statusClass = row[8]?.includes('تحصيل') ? 'collect' : 'pay';

      table.innerHTML += `

        <tr>
          <td>${row[0] || ''}</td>
          <td>${row[1] || ''}</td>
          <td>${row[2] || ''}</td>

          <td>
            <span class="badge ${operationClass}">
              ${row[3] || ''}
            </span>
          </td>

          <td>${row[4] || ''}</td>
          <td>${row[5] || ''}</td>
          <td>${formatNumber(row[6])}</td>
          <td>${row[7] || ''}</td>

          <td>
            <span class="badge ${statusClass}">
              ${row[8] || ''}
            </span>
          </td>

          <td>${formatNumber(row[9])}</td>
          <td>${row[10] || ''}</td>
          <td>${row[11] || ''}</td>
          <td>${row[12] || ''}</td>
        </tr>

      `;

    }

  }

  // =========================
  // SEARCH
  // =========================

  document.getElementById('searchInput').addEventListener('keyup', function(){

    const value = this.value.toLowerCase();

    const rows = document.querySelectorAll('#reportTable tr');

    rows.forEach(row => {

      row.style.display = row.innerText.toLowerCase().includes(value)
        ? ''
        : 'none';

    });

  });

}

loadClient();

</script>

</body>
</html>
