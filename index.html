<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deif Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#0f172a;
      color:#f8fafc;
      padding:20px;
      overflow-x:hidden;
    }

    .container{
      max-width:1600px;
      margin:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:20px;
    }

    .title h1{
      font-size:38px;
      font-weight:800;
    }

    .title p{
      color:#94a3b8;
      margin-top:8px;
    }

    .update-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      padding:15px 22px;
      border-radius:20px;
      backdrop-filter:blur(12px);
      color:#cbd5e1;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:linear-gradient(145deg,#111827,#1e293b);
      border:1px solid rgba(255,255,255,0.05);
      padding:25px;
      border-radius:28px;
      position:relative;
      overflow:hidden;
      transition:0.3s;
      box-shadow:0 15px 40px rgba(0,0,0,0.2);
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card::before{
      content:'';
      position:absolute;
      width:180px;
      height:180px;
      background:rgba(255,255,255,0.04);
      border-radius:50%;
      top:-60px;
      left:-60px;
    }

    .card-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .card-title{
      color:#cbd5e1;
      font-size:16px;
      font-weight:600;
    }

    .card-icon{
      font-size:32px;
    }

    .card-value{
      font-size:42px;
      font-weight:800;
    }

    .green{
      color:#22c55e;
    }

    .yellow{
      color:#facc15;
    }

    .blue{
      color:#38bdf8;
    }

    .section{
      background:linear-gradient(145deg,#111827,#1e293b);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:28px;
      padding:25px;
      margin-bottom:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
    }

    .section-title{
      font-size:28px;
      font-weight:800;
      margin-bottom:20px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .table-wrapper{
      overflow:auto;
      border-radius:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:700px;
    }

    thead{
      background:#020617;
      position:sticky;
      top:0;
      z-index:5;
    }

    th{
      padding:16px;
      color:#f8fafc;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }

    td{
      padding:14px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.05);
      color:#e2e8f0;
      font-size:14px;
      white-space:nowrap;
    }

    tbody tr:hover{
      background:rgba(255,255,255,0.03);
    }

    .positive{
      color:#22c55e;
      font-weight:700;
    }

    .negative{
      color:#ef4444;
      font-weight:700;
    }

    .badge{
      padding:7px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      display:inline-block;
    }

    .sell{
      background:#052e16;
      color:#22c55e;
    }

    .buy{
      background:#450a0a;
      color:#f87171;
    }

    .collect{
      background:#172554;
      color:#60a5fa;
    }

    .pay{
      background:#422006;
      color:#facc15;
    }

    .search-box{
      margin-bottom:18px;
    }

    .search-box input{
      width:100%;
      background:#0f172a;
      border:1px solid rgba(255,255,255,0.08);
      padding:14px 18px;
      border-radius:16px;
      color:white;
      font-size:15px;
      outline:none;
    }

    .daily-table{
      max-height:700px;
      overflow:auto;
      border-radius:20px;
    }

    @media(max-width:1000px){

      .grid-2{
        grid-template-columns:1fr;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .title h1{
        font-size:30px;
      }

      .card-value{
        font-size:32px;
      }

    }

  </style>
</head>
<body>

<div class="container">

  <div class="topbar">

    <div class="title">
      <h1>DEIF Dashboard</h1>
      <p>متابعة العملاء والموردين والتقرير اليومي</p>
    </div>

    <div class="update-box">
      آخر تحديث: <span id="updateTime">---</span>
    </div>

  </div>

  <div class="cards">

    <div class="card">
      <div class="card-header">
        <div class="card-title">رصيد الخزنة</div>
        <div class="card-icon">💰</div>
      </div>

      <div class="card-value green" id="cashBalance">0</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">صافي الربح</div>
        <div class="card-icon">📈</div>
      </div>

      <div class="card-value yellow" id="netProfit">0</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">إجمالي التعاملات</div>
        <div class="card-icon">🧾</div>
      </div>

      <div class="card-value blue" id="totalValue">0</div>
    </div>

  </div>


  <div class="grid-2">

    <div class="section">
      <div class="section-title">👥 العملاء</div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الرصيد</th>
            </tr>
          </thead>

          <tbody id="clientsTable"></tbody>

        </table>
      </div>

    </div>


    <div class="section">
      <div class="section-title">🏭 الموردين</div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الرصيد</th>
            </tr>
          </thead>

          <tbody id="suppliersTable"></tbody>

        </table>
      </div>

    </div>

  </div>


  <div class="section">
    <div class="section-title">📋 المستحقات</div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>المبلغ</th>
          </tr>
        </thead>

        <tbody id="duesTable"></tbody>

      </table>
    </div>

  </div>


  <div class="section">

    <div class="section-title">📊 التقرير اليومي</div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث عن عميل أو مورد أو صنف...">
    </div>

    <div class="daily-table">

      <table>

        <thead>
          <tr>
            <th>م</th>
            <th>عميل/مورد</th>
            <th>الاسم</th>
            <th>العملية</th>
            <th>الصنف</th>
            <th>الوزن</th>
            <th>سعر الطن</th>
            <th>ملحوظات</th>
            <th></th>
            <th>المبلغ</th>
            <th>التاريخ</th>
            <th></th>
            <th>اليوم</th>
          </tr>
        </thead>

        <tbody id="dailyReport"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

async function loadCSV(){

  const response = await fetch('./data/master.csv?v=' + new Date().getTime());

  const text = await response.text();

  const rows = text.split('\n').map(r => r.split(','));

  document.getElementById('updateTime').innerText = new Date().toLocaleString('ar-EG');

  // =========================
  // TOP CARDS
  // =========================

  document.getElementById('cashBalance').innerText = formatNumber(rows[27][8]);
  document.getElementById('netProfit').innerText = formatNumber(rows[25][6]);
  document.getElementById('totalValue').innerText = formatNumber(rows[27][6]);

  // =========================
  // CLIENTS
  // =========================

  const clientsTable = document.getElementById('clientsTable');

  for(let i = 1; i <= 23; i++){

    const name = rows[i][1];
    const balance = rows[i][3];

    if(name){

      clientsTable.innerHTML += `
        <tr>
          <td>${name}</td>
          <td class="${Number(balance) >= 0 ? 'positive' : 'negative'}">
            ${formatNumber(balance)}
          </td>
        </tr>
      `;

    }

  }

  // =========================
  // SUPPLIERS
  // =========================

  const suppliersTable = document.getElementById('suppliersTable');

  for(let i = 1; i <= 13; i++){

    const name = rows[i][6];
    const balance = rows[i][8];

    if(name){

      suppliersTable.innerHTML += `
        <tr>
          <td>${name}</td>
          <td class="${Number(balance) >= 0 ? 'positive' : 'negative'}">
            ${formatNumber(balance)}
          </td>
        </tr>
      `;

    }

  }

  // =========================
  // DUES
  // =========================

  const duesTable = document.getElementById('duesTable');

  for(let i = 12; i <= 22; i++){

    const name = rows[i][13];
    const amount = rows[i][14];

    if(name){

      duesTable.innerHTML += `
        <tr>
          <td>${name}</td>
          <td class="negative">${formatNumber(amount)}</td>
        </tr>
      `;

    }

  }

  // =========================
  // DAILY REPORT
  // =========================

  const dailyReport = document.getElementById('dailyReport');

  for(let i = 30; i < rows.length; i++){

    const row = rows[i];

    if(row[0]){

      let operationClass = row[3].includes('بيع') ? 'sell' : 'buy';

      let statusClass = row[8].includes('تحصيل') ? 'collect' : 'pay';

      dailyReport.innerHTML += `

        <tr>
          <td>${row[0]}</td>
          <td>${row[1]}</td>
          <td>${row[2]}</td>

          <td>
            <span class="badge ${operationClass}">
              ${row[3]}
            </span>
          </td>

          <td>${row[4]}</td>
          <td>${row[5]}</td>
          <td>${formatNumber(row[6])}</td>
          <td>${row[7]}</td>

          <td>
            <span class="badge ${statusClass}">
              ${row[8]}
            </span>
          </td>

          <td>${formatNumber(row[9])}</td>
          <td>${row[10]}</td>
          <td>${row[11]}</td>
          <td>${row[12]}</td>
        </tr>

      `;

    }

  }

  // =========================
  // SEARCH
  // =========================

  document.getElementById('searchInput').addEventListener('keyup', function(){

    const value = this.value.toLowerCase();

    const rows = document.querySelectorAll('#dailyReport tr');

    rows.forEach(row => {

      row.style.display = row.innerText.toLowerCase().includes(value)
        ? ''
        : 'none';

    });

  });

}

function formatNumber(value){

  if(!value) return '0';

  let number = Number(String(value).replace(/,/g,''));

  if(isNaN(number)) return value;

  return number.toLocaleString('en-US');

}

loadCSV();

</script>

</body>
</html>
